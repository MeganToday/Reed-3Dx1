<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monster Zapper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #000d1a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    /* ── overlay (splash / game-over / win) ── */
    #overlay {
      position: fixed;
      inset: 0;
      background: #000d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 200;
    }
    #overlay h1 { font-size: 2.8rem; color: #7df9ff; text-shadow: 0 0 16px #7df9ff; }
    #overlay h2 { font-size: 1.6rem; color: #ffdd57; }
    #overlay p  { font-size: 1.1rem; color: #ccc; text-align: center; }
    #overlay .big { font-size: 2.2rem; color: #7df9ff; font-weight: bold; }

    .lvl-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .lvl-btn {
      padding: 16px 24px;
      font-size: 1.2rem;
      font-family: inherit;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-width: 140px;
      line-height: 1.4;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .lvl-btn small { display: block; font-size: 0.65rem; font-weight: normal; opacity: 0.85; }
    #btn1 { background: #51cf66; color: #000; }
    #btn2 { background: #ffdd57; color: #000; }
    #btn3 { background: #ff6b6b; color: #fff; }
    .play-again {
      padding: 14px 36px;
      font-size: 1.3rem;
      font-family: inherit;
      font-weight: bold;
      background: #7df9ff;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── game ── */
    #game {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    /* HUD */
    #hud {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(0,0,0,0.6);
      font-size: 1rem;
      flex-shrink: 0;
    }
    #hud .hl { color: #7df9ff; font-weight: bold; }
    #hud .lv { color: #ffdd57; font-weight: bold; }
    #hud .lf { color: #ff6b6b; letter-spacing: 3px; }

    /* field */
    #field {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at top, #0d1b2a, #000510);
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) ease-in-out infinite alternate;
    }
    @keyframes twinkle { from{opacity:.2} to{opacity:1} }

    #ground {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, #f44, transparent);
      box-shadow: 0 0 10px #f44;
    }
    #cannon {
      position: absolute; bottom: 6px; left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      filter: drop-shadow(0 0 8px #7df9ff);
      z-index: 5;
      transition: left 0.15s ease;
    }
    #cannon::before {
      content:''; position:absolute; bottom:0; left:-22px;
      width:44px; height:22px;
      background:#2a4a6a; border-radius:6px 6px 0 0; border:2px solid #7df9ff;
    }
    #cannon::after {
      content:''; position:absolute; bottom:20px; left:-5px;
      width:10px; height:28px;
      background:#7df9ff; border-radius:4px 4px 0 0;
    }
    #laser {
      position:absolute; bottom:36px; left:50%;
      transform:translateX(-50%);
      width:4px; height:0; opacity:0;
      background:linear-gradient(to top,#7df9ff,transparent);
      border-radius:2px; z-index:6;
      box-shadow:0 0 8px #7df9ff;
      transition: height .12s ease-out, opacity .12s;
    }
    #laser.fire { opacity:1; }

    /* monsters */
    .monster {
      position:absolute; display:flex; flex-direction:column;
      align-items:center; gap:4px; z-index:4;
    }
    .monster .ico { font-size:2.6rem; line-height:1; }
    .monster .lbl {
      font-size:.9rem; font-weight:bold;
      background:rgba(0,0,0,.7); border:1px solid rgba(255,255,255,.2);
      border-radius:5px; padding:2px 7px; white-space:nowrap;
    }
    .monster.targeted .ico  { filter:drop-shadow(0 0 10px #ffdd57); animation:pulse .8s ease-in-out infinite alternate; }
    .monster.targeted .lbl  { border-color:#ffdd57; color:#ffdd57; }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }
    .monster.zapped  { animation:zap .35s forwards; }
    @keyframes zap {
      0%  {opacity:1;transform:scale(1)}
      50% {opacity:.6;transform:scale(1.4) rotate(15deg);filter:brightness(3)}
      100%{opacity:0;transform:scale(0)}
    }
    .monster.wrong .ico { animation:shake .4s ease; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)}
      60%{transform:translateX(-6px)}
      80%{transform:translateX(6px)}
    }

    /* work panel */
    #panel {
      flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      flex-wrap:wrap; gap:16px;
      padding:10px 14px 8px;
      background:rgba(0,0,0,.8);
      border-top:2px solid rgba(125,249,255,.25);
    }
    /* on narrow screens, math row + numpad stack naturally via flex-wrap */
    #panel-top {
      display:flex; align-items:center; justify-content:center; gap:16px;
      flex-wrap:wrap; width:100%;
    }
    #mult { display:flex; flex-direction:column; align-items:flex-end; gap:0; }
    .mrow { display:flex; align-items:flex-end; }
    .dcell { width:46px; display:flex; flex-direction:column; align-items:center; }
    .rslot {
      height:20px; min-width:20px; font-size:.85rem; font-weight:bold;
      color:#ffdd57; text-align:center; line-height:20px;
      border:2px solid transparent; border-radius:4px; visibility:hidden;
    }
    .rslot.waiting {
      visibility:visible; border-color:#ffdd57;
      background:rgba(255,221,87,.12); animation:popin .15s ease;
    }
    .rslot.filled { visibility:visible; border-color:transparent; }
    .rslot.bad { border-color:#f66; background:rgba(255,102,102,.15); animation:shake .3s ease; }
    @keyframes popin { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
    .tdig { width:46px; font-size:1.9rem; font-weight:bold; text-align:center; color:#fff; line-height:1.1; }
    .tdig.hi { color:#ffdd57; }
    .mop  { width:46px; font-size:1.9rem; font-weight:bold; text-align:center; color:#aaa; line-height:1.1; }
    .mline { height:3px; background:rgba(125,249,255,.5); border-radius:2px; margin:2px 0; }
    .adig {
      width:46px; height:40px; font-size:1.9rem; font-weight:bold;
      text-align:center; color:#7df9ff; line-height:40px;
      border-bottom:3px solid rgba(125,249,255,.3);
      transition:border-color .15s,background .15s;
    }
    .adig.hi  { border-bottom-color:#ffdd57; background:rgba(255,221,87,.08); border-radius:4px 4px 0 0; }
    .adig.ok  { border-bottom-color:#51cf66; }
    .adig.bad { border-bottom-color:#f66; animation:shake .3s ease; }

    #fire-btn {
      display:none; padding:12px 26px; font-size:1.2rem; font-family:inherit;
      font-weight:bold; background:#f44; color:#fff; border:3px solid #f88;
      border-radius:8px; cursor:pointer; touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      animation:fpulse .6s ease-in-out infinite alternate;
    }
    #fire-btn.on { display:block; }
    @keyframes fpulse { from{transform:scale(1)} to{transform:scale(1.06)} }
    #aim-hint { display:none; font-size:.78rem; color:#aaa; margin-top:4px; }
    #aim-hint.on { display:block; }

    /* numeric keypad */
    #numpad {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:6px;
      padding:8px;
      background:rgba(255,255,255,0.05);
      border-radius:10px;
      border:1px solid rgba(125,249,255,0.2);
      flex-shrink:0;
    }
    .npk {
      width:56px; height:56px;
      font-size:1.6rem; font-weight:bold; font-family:inherit;
      background:rgba(255,255,255,0.12);
      color:#fff; border:2px solid rgba(255,255,255,0.25);
      border-radius:8px; cursor:pointer;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none; user-select:none;
      transition:background 0.08s, transform 0.06s;
    }
    .npk:active { background:rgba(125,249,255,0.4); transform:scale(0.9); }
    .npk.flash-ok  { background:rgba(81,207,102,0.6);  border-color:#51cf66; }
    .npk.flash-bad { background:rgba(255,80,80,0.6); border-color:#f44; }

    /* on small screens, stack math above numpad */
    @media (max-width: 500px) {
      #panel { flex-direction:column; padding:8px 8px 6px; gap:10px; }
      .npk { width:64px; height:64px; font-size:1.8rem; }
      #numpad { gap:8px; }
    }

    /* wave banner */
    #wbanner {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:3rem; color:#ffdd57; text-shadow:0 0 28px #ffdd57;
      font-weight:bold; z-index:50; pointer-events:none;
      opacity:0; transition:opacity .4s;
    }
    #wbanner.on { opacity:1; }

    /* wrong flash */
    #wflash {
      position:fixed; inset:0; background:rgba(255,50,50,0);
      pointer-events:none; z-index:99; transition:background .15s;
    }
    #wflash.on { background:rgba(255,50,50,.15); }

    .particle {
      position:absolute; width:8px; height:8px; border-radius:50%;
      pointer-events:none; z-index:7;
      animation:pfly var(--dur) ease-out forwards;
    }
    @keyframes pfly { from{transform:translate(0,0) scale(1);opacity:1} to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }
  </style>
</head>
<body>

<div id="wbanner"></div>
<div id="wflash"></div>

<!-- OVERLAY: splash / game-over / win -->
<div id="overlay">
  <div id="view-splash">
    <div style="text-align:center">
      <h1>👾 Monster Zapper</h1>
      <h2 style="margin-top:8px">3-Digit × 1-Digit</h2>
      <p style="margin-top:12px">Choose your level:</p>
      <div class="lvl-row" style="margin-top:18px">
        <button class="lvl-btn" id="btn1">Level 1<small>1 regroup · easier math</small></button>
        <button class="lvl-btn" id="btn2">Level 2<small>1 regroup · all multipliers</small></button>
        <button class="lvl-btn" id="btn3">Level 3<small>2 regroups · all multipliers</small></button>
      </div>
    </div>
  </div>
  <div id="view-over" style="display:none;text-align:center">
    <h1>💥 Game Over</h1>
    <p style="margin-top:8px">The monsters reached the city!</p>
    <p style="margin-top:8px">Score: <span class="big" id="final-score">0</span></p>
    <button class="play-again" id="btn-again-over" style="margin-top:18px">Play Again</button>
  </div>
  <div id="view-win" style="display:none;text-align:center">
    <h1>🏆 You Win!</h1>
    <p style="margin-top:8px">You saved the city!</p>
    <p style="margin-top:8px">Score: <span class="big" id="win-score">0</span></p>
    <button class="play-again" id="btn-again-win" style="margin-top:18px">Play Again</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="hud">
    <div>❤️ <span class="lf" id="lives-disp">♥♥♥</span></div>
    <div>Lv <span class="lv" id="lv-disp">1</span> &nbsp; Wave <span class="lv" id="wave-disp">1</span>/5</div>
    <div>Score <span class="hl" id="score-disp">0</span></div>
  </div>
  <div id="field">
    <div id="ground"></div>
    <div id="cannon"></div>
    <div id="laser"></div>
  </div>
  <div id="panel">
    <div id="mult"></div>
    <div id="numpad">
      <button class="npk" data-n="7">7</button>
      <button class="npk" data-n="8">8</button>
      <button class="npk" data-n="9">9</button>
      <button class="npk" data-n="4">4</button>
      <button class="npk" data-n="5">5</button>
      <button class="npk" data-n="6">6</button>
      <button class="npk" data-n="1">1</button>
      <button class="npk" data-n="2">2</button>
      <button class="npk" data-n="3">3</button>
      <button class="npk" data-n="0" style="grid-column:2">0</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <button id="fire-btn">🚀 FIRE!</button>
      <div id="aim-hint">drag field to aim</div>
    </div>
  </div>
</div>

<script>
// ── stars ──────────────────────────────────────
const fieldEl = document.getElementById('field');
for (let i = 0; i < 100; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + .5;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s`;
  fieldEl.appendChild(s);
}

// ── problem generator ───────────────────────────
function countCarries(a, b) {
  let carry = 0, n = 0;
  for (const d of [a % 10, Math.floor(a/10) % 10, Math.floor(a/100)]) {
    const p = d * b + carry; carry = Math.floor(p/10); if (carry) n++;
  }
  return n;
}
function validProblem(a, b, lv) {
  const c = countCarries(a, b);
  if (lv === 1) return c === 1 && b <= 5;
  if (lv === 2) return c === 1;
  return c >= 2;
}
function makeProblem() {
  let a, b, tries = 0;
  do { a = Math.floor(Math.random()*900)+100; b = Math.floor(Math.random()*8)+2; tries++; }
  while (!validProblem(a, b, G.level) && tries < 300);
  return { a, b, ans: a * b };
}

// ── game state ──────────────────────────────────
const WAVES = 5, SIZES = [4,5,5,6,6], SPEED0 = 0.198, DINC = 0.04, TICK = 50, THRESH = 0.92;
let G = {};
function resetG(lv) {
  G = { level:lv, lives:3, score:0, wave:1, monsters:[], nextId:0,
        running:false, paused:false, fireReady:false, fireTarget:null,
        ticker:null, curProblem:null, usedProbs:new Set(), waveDone:false };
}

// ── DOM refs ────────────────────────────────────
const overlay   = document.getElementById('overlay');
const vSplash   = document.getElementById('view-splash');
const vOver     = document.getElementById('view-over');
const vWin      = document.getElementById('view-win');
const gameDiv   = document.getElementById('game');
const field     = document.getElementById('field');
const laser     = document.getElementById('laser');
const cannon    = document.getElementById('cannon');
const multDiv   = document.getElementById('mult');
const wbanner   = document.getElementById('wbanner');
const wflash    = document.getElementById('wflash');
const livesDisp = document.getElementById('lives-disp');
const lvDisp    = document.getElementById('lv-disp');
const waveDisp  = document.getElementById('wave-disp');
const scoreDisp = document.getElementById('score-disp');

// ── button wiring ───────────────────────────────
document.getElementById('btn1').addEventListener('click', () => startGame(1));
document.getElementById('btn2').addEventListener('click', () => startGame(2));
document.getElementById('btn3').addEventListener('click', () => startGame(3));
document.getElementById('btn-again-over').addEventListener('click', showSplash);
document.getElementById('btn-again-win').addEventListener('click', showSplash);
document.getElementById('fire-btn').addEventListener('click', doFire);

// ── screens ─────────────────────────────────────
function showSplash() {
  gameDiv.style.display = 'none';
  overlay.style.display = 'flex';
  vSplash.style.display = 'block';
  vOver.style.display   = 'none';
  vWin.style.display    = 'none';
}
function showOver() {
  clearInterval(G.ticker); G.running = false;
  document.getElementById('final-score').textContent = G.score;
  gameDiv.style.display = 'none';
  overlay.style.display = 'flex';
  vSplash.style.display = 'none';
  vOver.style.display   = 'block';
  vWin.style.display    = 'none';
}
function showWin() {
  document.getElementById('win-score').textContent = G.score;
  gameDiv.style.display = 'none';
  overlay.style.display = 'flex';
  vSplash.style.display = 'none';
  vOver.style.display   = 'none';
  vWin.style.display    = 'block';
}

// ── start game ───────────────────────────────────
function startGame(lv) {
  overlay.style.display = 'none';
  gameDiv.style.display = 'flex';
  gameDiv.style.flexDirection = 'column';
  resetG(lv);
  updateHUD();
  startWave();
}

// ── wave ─────────────────────────────────────────
function startWave() {
  G.waveDone = false; G.paused = false; G.fireReady = false; G.fireTarget = null;
  G.curProblem = null; G.usedProbs.clear();
  document.getElementById('fire-btn').classList.remove('on');
  document.getElementById('aim-hint').classList.remove('on');
  field.querySelectorAll('.monster').forEach(e => e.remove());
  G.monsters = [];
  waveDisp.textContent = G.wave;
  flashBanner('Wave ' + G.wave);
  const count = SIZES[G.wave-1] || 6;
  const speed = (G.level===1 ? SPEED0*1.75 : SPEED0) + (G.wave-1)*DINC;
  cannon.style.left = '50%'; cannon.style.transform = 'translateX(-50%)';
  buildWorkDisplay(null);
  setTimeout(() => {
    spawnMonsters(count, speed);
    G.running = true;
    clearInterval(G.ticker);
    G.ticker = setInterval(tick, TICK);
    retarget();
  }, 1600);
}

function flashBanner(txt) {
  wbanner.textContent = txt; wbanner.classList.add('on');
  setTimeout(() => wbanner.classList.remove('on'), 1500);
}

// ── spawn ────────────────────────────────────────
const EMOJIS = ['👾','🛸','👽','🤖','💀','🧟','🐙','🦑'];
function spawnMonsters(count, speed) {
  const W = field.offsetWidth, margin = 70, usedX = [];
  for (let i = 0; i < count; i++) {
    const prob = uniqueProblem();
    let x, tries = 0;
    do { x = margin + Math.random()*(W-margin*2); tries++; }
    while (usedX.some(u => Math.abs(u-x)<90) && tries<30);
    usedX.push(x);
    const y = -(80 + i*110);
    const emoji = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    const el = document.createElement('div');
    el.className = 'monster';
    el.style.left = x+'px'; el.style.top = y+'px';
    el.innerHTML = `<div class="ico">${emoji}</div><div class="lbl">${prob.a} × ${prob.b}</div>`;
    field.appendChild(el);
    G.monsters.push({ id:G.nextId++, prob, el, y, speed, active:true });
  }
}
function uniqueProblem() {
  let p, tries=0;
  do { p = makeProblem(); tries++; }
  while (G.usedProbs.has(p.a+'x'+p.b) && tries<50);
  G.usedProbs.add(p.a+'x'+p.b);
  return p;
}

// ── tick ─────────────────────────────────────────
function tick() {
  if (!G.running || G.paused) return;
  const H = field.offsetHeight, thresh = H * THRESH;
  G.monsters.forEach(m => {
    if (!m.active) return;
    m.y += m.speed; m.el.style.top = m.y+'px';
    if (m.y >= thresh) loseLife(m);
  });
  if (G.monsters.every(m => !m.active) && !G.waveDone) { G.waveDone=true; waveComplete(); }
}

// ── targeting ────────────────────────────────────
function retarget() {
  const alive = G.monsters.filter(m => m.active);
  if (!alive.length) return;
  const tgt = alive.reduce((a,b) => a.y > b.y ? a : b);
  G.monsters.forEach(m => m.el.classList.remove('targeted'));
  tgt.el.classList.add('targeted');
  if (!G.curProblem || G.curProblem.mId !== tgt.id) buildWorkDisplay(tgt);
}

// ── work display ─────────────────────────────────
function buildWorkDisplay(mon) {
  multDiv.innerHTML = '';
  if (!mon) {
    multDiv.innerHTML = '<div style="color:#555;font-size:.9rem">Waiting…</div>';
    return;
  }
  const { a, b } = mon.prob;
  const digits = [Math.floor(a/100), Math.floor(a/10)%10, a%10];
  const W = 46;
  const S = {
    mId:mon.id, mon, a, b, digits,
    colIdx:2, phase:'answer',
    carryIn:[0,0,0],
    regroupEls:[], topEls:[], ansEls:[],
    _regroup:0, _regroupToCol:0,
  };

  // regroup row
  const rrow = document.createElement('div'); rrow.className='mrow';
  const rsp = document.createElement('div'); rsp.style.width=W+'px'; rrow.appendChild(rsp);
  digits.forEach((_,i) => {
    const c=document.createElement('div'); c.className='dcell';
    const s=document.createElement('span'); s.className='rslot';
    c.appendChild(s); rrow.appendChild(c); S.regroupEls[i]=s;
  });
  multDiv.appendChild(rrow);

  // number row
  const nrow = document.createElement('div'); nrow.className='mrow';
  const nsp = document.createElement('div'); nsp.style.width=W+'px'; nrow.appendChild(nsp);
  digits.forEach((d,i) => {
    const c=document.createElement('div'); c.className='dcell';
    const s=document.createElement('span'); s.className='tdig'; s.textContent=d;
    c.appendChild(s); nrow.appendChild(c); S.topEls[i]=s;
  });
  multDiv.appendChild(nrow);

  // multiplier row
  const mrow = document.createElement('div'); mrow.className='mrow'; mrow.style.alignItems='center';
  const xc = document.createElement('div'); xc.className='mop'; xc.textContent='×'; mrow.appendChild(xc);
  for (let i=0;i<2;i++){const sp=document.createElement('div');sp.style.width=W+'px';mrow.appendChild(sp);}
  const bc=document.createElement('div'); bc.style.cssText=`width:${W}px;text-align:center;font-size:1.9rem;font-weight:bold;color:#fff`; bc.textContent=b; mrow.appendChild(bc);
  multDiv.appendChild(mrow);

  // line
  const lrow=document.createElement('div'); lrow.className='mrow';
  const ln=document.createElement('div'); ln.className='mline'; ln.style.width=(4*W)+'px'; lrow.appendChild(ln);
  multDiv.appendChild(lrow);

  // answer row
  const arow=document.createElement('div'); arow.className='mrow';
  for (let i=0;i<4;i++){
    const c=document.createElement('div'); c.className='dcell';
    const d=document.createElement('div'); d.className='adig';
    c.appendChild(d); arow.appendChild(c); S.ansEls[i]=d;
  }
  multDiv.appendChild(arow);

  G.curProblem = S;
  hilite();
}

function hilite() {
  const S = G.curProblem; if(!S) return;
  S.topEls.forEach(e => e.classList.remove('hi'));
  S.ansEls.forEach(e => e.classList.remove('hi'));
  if (S.phase==='answer' || S.phase==='leading') {
    if (S.phase==='answer') S.topEls[S.colIdx].classList.add('hi');
    const ai = S.phase==='leading' ? 0 : S.colIdx+1;
    S.ansEls[ai].classList.add('hi');
  }
}

// ── numpad wiring ────────────────────────────────
document.querySelectorAll('.npk').forEach(btn => {
  btn.addEventListener('click', () => pressDigit(parseInt(btn.dataset.n), btn));
});

function pressDigit(d, btnEl) {
  if (G.fireReady) return;
  if (!G.running || G.paused) return;
  const S = G.curProblem; if (!S) return;
  const accepted =
    S.phase==='answer'  ? onAnswer(S, d) :
    S.phase==='regroup' ? onRegroup(S, d) :
    S.phase==='leading' ? onLeading(S, d) : false;
  if (btnEl) {
    btnEl.classList.add(accepted ? 'flash-ok' : 'flash-bad');
    setTimeout(() => btnEl.classList.remove('flash-ok','flash-bad'), 300);
  }
}

// ── key handler ──────────────────────────────────
document.addEventListener('keydown', e => {
  if (G.fireReady) {
    if (e.key===' '||e.key==='Enter') { e.preventDefault(); doFire(); return; }
    if (e.key==='ArrowLeft'||e.key==='ArrowRight') { e.preventDefault(); aimCannon(e.key==='ArrowLeft'?-1:1); return; }
  }
  if (!G.running || G.paused) return;
  if (!/^[0-9]$/.test(e.key)) return;
  e.preventDefault();
  pressDigit(parseInt(e.key), null);
});

function onAnswer(S, d) {
  const cin = S.carryIn[S.colIdx];
  const prod = S.digits[S.colIdx] * S.b + cin;
  const exp = prod % 10, rg = Math.floor(prod/10);
  if (d !== exp) { flashWrong(S.mon); return false; }
  const slot = S.ansEls[S.colIdx+1];
  slot.textContent = d; slot.classList.remove('hi'); slot.classList.add('ok');
  if (rg > 0 && S.colIdx > 0) {
    S.carryIn[S.colIdx-1] = rg; S._regroup=rg; S._regroupToCol=S.colIdx-1;
    S.phase='regroup';
    const rs = S.regroupEls[S.colIdx-1];
    rs.className='rslot waiting';
    hilite();
  } else {
    if (S.colIdx===0 && rg>0) { S._leading=rg; S.phase='leading'; S.ansEls[0].classList.add('hi'); hilite(); }
    else nextCol(S);
  }
  return true;
}

function onRegroup(S, d) {
  const rs = S.regroupEls[S._regroupToCol];
  if (d !== S._regroup) { rs.classList.add('bad'); setTimeout(()=>rs.classList.remove('bad'),400); flashWrong(S.mon); return false; }
  rs.textContent=d; rs.className='rslot filled';
  S.phase='answer'; nextCol(S);
  return true;
}

function onLeading(S, d) {
  if (d !== S._leading) { S.ansEls[0].classList.add('bad'); setTimeout(()=>S.ansEls[0].classList.remove('bad'),400); flashWrong(S.mon); return false; }
  S.ansEls[0].textContent=d; S.ansEls[0].classList.remove('hi'); S.ansEls[0].classList.add('ok');
  mathDone(S);
  return true;
}

function nextCol(S) {
  S.colIdx--;
  if (S.colIdx < 0) { mathDone(S); return; }
  S.phase='answer'; hilite();
}

function mathDone(S) {
  G.paused=true; G.fireReady=true; G.fireTarget=S.mon;
  G.monsters.forEach(m=>m.el.classList.remove('targeted'));
  S.mon.el.classList.add('targeted');
  document.getElementById('fire-btn').classList.add('on');
  const alive=G.monsters.filter(m=>m.active);
  if (alive.length>1) document.getElementById('aim-hint').classList.add('on');
}

// ── fire / aim ───────────────────────────────────
function doFire() {
  if (!G.fireReady) return;
  const m = G.fireTarget; if(!m||!m.active) return;
  document.getElementById('fire-btn').classList.remove('on');
  document.getElementById('aim-hint').classList.remove('on');
  G.fireReady=false; G.paused=false; G.fireTarget=null;
  G.score += 100 + G.wave*10; updateHUD();
  zap(m); m.active=false;
  G.curProblem=null; buildWorkDisplay(null);
  cannon.style.left='50%'; cannon.style.transform='translateX(-50%)';
  setTimeout(()=>{ m.el.remove(); retarget(); }, 400);
}

const CSTEP=18;
function aimCannon(dir) {
  const fw=field.offsetWidth, fr=field.getBoundingClientRect();
  const cr=cannon.getBoundingClientRect();
  const cx=cr.left+cr.width/2-fr.left;
  const nx=Math.max(30, Math.min(fw-30, cx+dir*CSTEP));
  setCannonX(nx);
}

function setCannonX(nx) {
  const fw=field.offsetWidth, fr=field.getBoundingClientRect();
  nx = Math.max(30, Math.min(fw-30, nx));
  cannon.style.left=nx+'px'; cannon.style.transform='translateX(-50%)';
  const alive=G.monsters.filter(m=>m.active); if(!alive.length) return;
  let best=alive[0], bestD=Infinity;
  alive.forEach(m=>{ const r=m.el.getBoundingClientRect(); const mx=r.left+r.width/2-fr.left; const d=Math.abs(mx-nx); if(d<bestD){bestD=d;best=m;} });
  G.fireTarget=best;
  G.monsters.forEach(m=>m.el.classList.remove('targeted'));
  best.el.classList.add('targeted');
}

// ── touch-drag aiming on the field ───────────────
let _touchAiming = false;
field.addEventListener('touchstart', e => {
  if (!G.fireReady) return;
  _touchAiming = true;
  const fr = field.getBoundingClientRect();
  setCannonX(e.touches[0].clientX - fr.left);
}, { passive: true });

field.addEventListener('touchmove', e => {
  if (!G.fireReady || !_touchAiming) return;
  e.preventDefault();
  const fr = field.getBoundingClientRect();
  setCannonX(e.touches[0].clientX - fr.left);
}, { passive: false });

field.addEventListener('touchend', () => { _touchAiming = false; });

// ── zap ──────────────────────────────────────────
function zap(m) {
  m.el.classList.add('zapped');
  // laser
  const fr=field.getBoundingClientRect(), mr=m.el.getBoundingClientRect();
  const cr=cannon.getBoundingClientRect();
  const lx=cr.left+cr.width/2-fr.left;
  const my=mr.top+mr.height/2-fr.top;
  const cy=field.offsetHeight-36;
  laser.style.left=lx+'px'; laser.style.transform='translateX(-50%)';
  laser.style.height=(cy-my)+'px'; laser.classList.add('fire');
  setTimeout(()=>{ laser.classList.remove('fire'); laser.style.height='0'; },220);
  // particles
  const cx2=mr.left+mr.width/2-fr.left, cy2=mr.top+mr.height/2-fr.top;
  const cols=['#7df9ff','#ffdd57','#ff6b6b','#51cf66','#fff'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div'); p.className='particle';
    const a=(i/12)*Math.PI*2, dist=40+Math.random()*50;
    p.style.cssText=`left:${cx2}px;top:${cy2}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*dist}px;--dy:${Math.sin(a)*dist}px;--dur:${.3+Math.random()*.3}s`;
    field.appendChild(p); setTimeout(()=>p.remove(),700);
  }
}

// ── wrong answer ─────────────────────────────────
function flashWrong(m) {
  m.y += field.offsetHeight*0.05; m.el.style.top=m.y+'px';
  m.el.classList.remove('wrong'); void m.el.offsetWidth; m.el.classList.add('wrong');
  setTimeout(()=>m.el.classList.remove('wrong'),500);
  wflash.classList.add('on'); setTimeout(()=>wflash.classList.remove('on'),200);
}

// ── life lost ────────────────────────────────────
function loseLife(m) {
  m.active=false; m.el.remove(); G.lives--;
  wflash.classList.add('on'); setTimeout(()=>wflash.classList.remove('on'),300);
  updateHUD();
  if (G.lives<=0) { showOver(); return; }
  if (G.curProblem && G.curProblem.mId===m.id) { G.curProblem=null; buildWorkDisplay(null); }
  retarget();
}

// ── wave complete ────────────────────────────────
function waveComplete() {
  clearInterval(G.ticker); G.running=false;
  if (G.wave>=WAVES) { setTimeout(showWin,800); }
  else { G.wave++; setTimeout(startWave,1200); }
}

// ── HUD ──────────────────────────────────────────
function updateHUD() {
  livesDisp.textContent='♥'.repeat(Math.max(0,G.lives));
  scoreDisp.textContent=G.score;
  waveDisp.textContent=G.wave;
  lvDisp.textContent=G.level;
}
</script>
